<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Submissions</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;background:#f5f5f3;color:#1a1916;min-height:100vh}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-box{background:white;padding:3rem;border:1px solid #e0ddd7;max-width:360px;width:100%}
.login-box h1{font-size:1.1rem;font-weight:600;margin-bottom:.25rem}
.login-box p{font-size:.82rem;color:#888;margin-bottom:2rem}
.login-box input{width:100%;border:1px solid #d0cdc8;padding:.75rem 1rem;font-size:.9rem;font-family:inherit;margin-bottom:1rem;outline:none}
.login-box input:focus{border-color:#1a1916}
.login-box button{width:100%;background:#1a1916;color:white;border:none;padding:.85rem;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:inherit}
.login-box button:hover{background:#333}
#dashboard{display:none;padding:2rem 3rem;max-width:1400px;margin:0 auto}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid #e0ddd7}
.dash-header h1{font-size:1.2rem;font-weight:600}
.dash-meta{font-size:.78rem;color:#888}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:white;padding:1.5rem;border:1px solid #e0ddd7}
.stat-card .n{font-size:2rem;font-weight:700;line-height:1;margin-bottom:.25rem}
.stat-card .l{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:#888}
.filters{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.filter-btn{padding:.5rem 1rem;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;border:1px solid #d0cdc8;background:white;cursor:pointer;font-family:inherit;transition:all .2s}
.filter-btn.active,.filter-btn:hover{background:#1a1916;color:white;border-color:#1a1916}
.filter-input{padding:.5rem 1rem;font-size:.82rem;border:1px solid #d0cdc8;outline:none;font-family:inherit;min-width:200px}
.filter-input:focus{border-color:#1a1916}
table{width:100%;background:white;border:1px solid #e0ddd7;border-collapse:collapse}
th{text-align:left;padding:.85rem 1rem;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:#888;border-bottom:1px solid #e0ddd7;white-space:nowrap;background:#fafaf8}
td{padding:.85rem 1rem;font-size:.82rem;border-bottom:1px solid #f0ede8;vertical-align:top;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:#fafaf8}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:.2rem .6rem;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;border-radius:2px}
.badge.new{background:#e8f5f5;color:#0d6b6e}
.badge.read{background:#f5f5f3;color:#888}
.site-tag{display:inline-block;padding:.15rem .5rem;font-size:.65rem;background:#f0ede8;color:#5c3520;border-radius:2px}
.empty{text-align:center;padding:4rem 2rem;color:#888;font-size:.9rem}
.refresh-btn{padding:.5rem 1.25rem;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;border:1px solid #d0cdc8;background:white;cursor:pointer;font-family:inherit}
.refresh-btn:hover{background:#f5f5f3}
.loading{text-align:center;padding:3rem;color:#888}
.error-msg{background:#fef2f2;color:#dc2626;padding:1rem 1.5rem;border:1px solid #fecaca;margin-bottom:1.5rem;font-size:.82rem}
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h1>Admin Dashboard</h1>
    <p>Submissions from all portfolio sites</p>
    <input type="password" id="pwdInput" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Sign In</button>
    <div id="loginError" style="margin-top:1rem;font-size:.8rem;color:#dc2626;display:none">Incorrect password.</div>
  </div>
</div>

<div id="dashboard">
  <div class="dash-header">
    <div>
      <h1>Submissions</h1>
      <div class="dash-meta" id="dashMeta">Loading...</div>
    </div>
    <div style="display:flex;gap:.75rem;align-items:center">
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      <button class="refresh-btn" onclick="exportCSV()">↓ Export CSV</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="n" id="statTotal">—</div><div class="l">Total Submissions</div></div>
    <div class="stat-card"><div class="n" id="statToday">—</div><div class="l">Today</div></div>
    <div class="stat-card"><div class="n" id="statNew">—</div><div class="l">Unread</div></div>
    <div class="stat-card"><div class="n" id="statSites">—</div><div class="l">Active Sites</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('new',this)">New Only</button>
    <div id="siteFilters"></div>
    <input type="text" class="filter-input" id="searchInput" placeholder="Search by name, email, service..." oninput="renderTable()">
  </div>

  <div id="errorMsg" class="error-msg" style="display:none"></div>
  <div id="tableWrap"><div class="loading">Loading submissions...</div></div>
</div>

<script>
let allData = [], currentFilter = 'all', pwd = '';

function login() {
  pwd = document.getElementById('pwdInput').value;
  if (!pwd) return;
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('login').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadData();
}

async function loadData() {
  document.getElementById('tableWrap').innerHTML = '<div class="loading">Loading...</div>';
  try {
    const res = await fetch(`/api/admin?password=${encodeURIComponent(pwd)}`);
    if (res.status === 401) {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('login').style.display = 'flex';
      document.getElementById('loginError').style.display = 'block';
      return;
    }
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allData = data.submissions || [];
    updateStats();
    buildSiteFilters();
    renderTable();
    document.getElementById('dashMeta').textContent =
      `Last updated ${new Date().toLocaleTimeString()} · ${allData.length} total submissions`;
  } catch (e) {
    document.getElementById('errorMsg').textContent = `Error: ${e.message}. Make sure KV is configured and ADMIN_PASSWORD is set.`;
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('tableWrap').innerHTML = '';
  }
}

function updateStats() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('statTotal').textContent = allData.length;
  document.getElementById('statToday').textContent = allData.filter(s => s.timestamp?.startsWith(today)).length;
  document.getElementById('statNew').textContent = allData.filter(s => s.status === 'new').length;
  document.getElementById('statSites').textContent = new Set(allData.map(s => s.siteName).filter(Boolean)).size;
}

function buildSiteFilters() {
  const sites = [...new Set(allData.map(s => s.siteName).filter(Boolean))];
  const wrap = document.getElementById('siteFilters');
  wrap.innerHTML = sites.map(s =>
    `<button class="filter-btn" onclick="setFilter('site:${s}',this)">${s}</button>`
  ).join('');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let rows = allData.filter(s => {
    if (currentFilter === 'new' && s.status !== 'new') return false;
    if (currentFilter.startsWith('site:') && s.siteName !== currentFilter.slice(5)) return false;
    if (search) {
      const hay = [s.name, s.email, s.phone, s.service, s.siteName, s.message].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  if (!rows.length) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty">No submissions match your filter.</div>';
    return;
  }

  const fmt = ts => ts ? new Date(ts).toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '—';
  const esc = v => (v || '').toString().replace(/</g,'&lt;');

  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Status</th><th>Date</th><th>Site</th><th>Name</th>
        <th>Contact</th><th>Service</th><th>Appt</th><th>Message</th>
      </tr></thead>
      <tbody>${rows.map(s => `
        <tr>
          <td><span class="badge ${s.status}">${s.status||'new'}</span></td>
          <td style="color:#888">${fmt(s.timestamp)}</td>
          <td><span class="site-tag">${esc(s.siteName)}</span></td>
          <td><strong>${esc(s.name)}</strong></td>
          <td style="color:#0d6b6e">${esc(s.email||s.phone)}</td>
          <td>${esc(s.service)}</td>
          <td style="white-space:nowrap">${[s.date, s.time].filter(Boolean).join(' ')}</td>
          <td style="color:#888;font-size:.78rem">${esc((s.message||'').slice(0,80))}${s.message?.length>80?'…':''}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function exportCSV() {
  const cols = ['id','timestamp','siteName','name','email','phone','service','date','time','occasion','message','status'];
  const rows = [cols.join(','), ...allData.map(s => cols.map(c => `"${(s[c]||'').toString().replace(/"/g,'""')}"`).join(','))];
  const blob = new Blob([rows.join('\n')], { type:'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `submissions_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

// Auto-refresh every 60s
setInterval(() => { if (pwd) loadData(); }, 60000);
</script>
</body>
</html>
